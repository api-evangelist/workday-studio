naftiko: 1.0.0-alpha2
info:
  label: Workday Studio Workday Web Services API — Compensation
  description: 'Workday Studio Workday Web Services API — Compensation. 1 operations. Lead operation: Workday Studio Retrieve
    Compensation Plans. Self-contained Naftiko capability covering one Workday Studio business surface.'
  tags:
  - Workday Studio
  - Compensation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_STUDIO_API_KEY: WORKDAY_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-services-compensation
    baseUri: https://{baseUrl}/ccx/service/{tenant}
    description: Workday Studio Workday Web Services API — Compensation business capability. Self-contained, no shared references.
    resources:
    - name: Compensation-Get_Compensation_Plans
      path: /Compensation/Get_Compensation_Plans
      operations:
      - name: getcompensationplans
        method: POST
        description: Workday Studio Retrieve Compensation Plans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WORKDAY_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: web-services-compensation-rest
    port: 8080
    description: REST adapter for Workday Studio Workday Web Services API — Compensation. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/compensation/get-compensation-plans
      name: compensation-get-compensation-plans
      description: REST surface for Compensation-Get_Compensation_Plans.
      operations:
      - method: POST
        name: getcompensationplans
        description: Workday Studio Retrieve Compensation Plans
        call: web-services-compensation.getcompensationplans
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-services-compensation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Studio Workday Web Services API — Compensation. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-studio-retrieve-compensation-plans
      description: Workday Studio Retrieve Compensation Plans
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: web-services-compensation.getcompensationplans
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
