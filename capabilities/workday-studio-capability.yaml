      - method: GET
        name: getintegrationevent
        description: Workday Studio Retrieve a Specific Integration Event
        call: workday-studio.getintegrationevent
        outputParameters:
        - type: object
          mapping: $.
    - path: /integrationEvents/{ID}/logs
      name: getintegrationeventlogs
