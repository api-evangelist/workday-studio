naftiko: 1.0.0-alpha2
info:
  label: Workday Studio Integration API — Integration Events
  description: 'Workday Studio Integration API — Integration Events. 3 operations. Lead operation: Workday Studio List Integration
    Events. Self-contained Naftiko capability covering one Workday Studio business surface.'
  tags:
  - Workday Studio
  - Integration Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_STUDIO_API_KEY: WORKDAY_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: integration-integration-events
    baseUri: https://{baseUrl}/ccx/service/{tenant}
    description: Workday Studio Integration API — Integration Events business capability. Self-contained, no shared references.
    resources:
    - name: integrationEvents
      path: /integrationEvents
      operations:
      - name: listintegrationevents
        method: GET
        description: Workday Studio List Integration Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter events by execution status
        - name: fromDate
          in: query
          type: string
          description: Filter events starting from this date
        - name: toDate
          in: query
          type: string
          description: Filter events up to this date
    - name: integrationEvents-ID
      path: /integrationEvents/{ID}
      operations:
      - name: getintegrationevent
        method: GET
        description: Workday Studio Retrieve a Specific Integration Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: integrationEvents-ID-logs
      path: /integrationEvents/{ID}/logs
      operations:
      - name: getintegrationeventlogs
        method: GET
        description: Workday Studio Retrieve Logs for an Integration Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: integration-integration-events-rest
    port: 8080
    description: REST adapter for Workday Studio Integration API — Integration Events. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/integrationevents
      name: integrationevents
      description: REST surface for integrationEvents.
      operations:
      - method: GET
        name: listintegrationevents
        description: Workday Studio List Integration Events
        call: integration-integration-events.listintegrationevents
        with:
          status: rest.status
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/integrationevents/{id}
      name: integrationevents-id
      description: REST surface for integrationEvents-ID.
      operations:
      - method: GET
        name: getintegrationevent
        description: Workday Studio Retrieve a Specific Integration Event
        call: integration-integration-events.getintegrationevent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/integrationevents/{id}/logs
      name: integrationevents-id-logs
      description: REST surface for integrationEvents-ID-logs.
      operations:
      - method: GET
        name: getintegrationeventlogs
        description: Workday Studio Retrieve Logs for an Integration Event
        call: integration-integration-events.getintegrationeventlogs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: integration-integration-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Studio Integration API — Integration Events. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-studio-list-integration-events
      description: Workday Studio List Integration Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: integration-integration-events.listintegrationevents
      with:
        status: tools.status
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-studio-retrieve-specific-integration
      description: Workday Studio Retrieve a Specific Integration Event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: integration-integration-events.getintegrationevent
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-studio-retrieve-logs-integration
      description: Workday Studio Retrieve Logs for an Integration Event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: integration-integration-events.getintegrationeventlogs
      outputParameters:
      - type: object
        mapping: $.
