naftiko: 1.0.0-alpha2
info:
  label: Workday Studio Workday Web Services API — Absence Management
  description: 'Workday Studio Workday Web Services API — Absence Management. 1 operations. Lead operation: Workday Studio
    Retrieve Absence Inputs. Self-contained Naftiko capability covering one Workday Studio business surface.'
  tags:
  - Workday Studio
  - Absence Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_STUDIO_API_KEY: WORKDAY_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-services-absence-management
    baseUri: https://{baseUrl}/ccx/service/{tenant}
    description: Workday Studio Workday Web Services API — Absence Management business capability. Self-contained, no shared
      references.
    resources:
    - name: Absence_Management-Get_Absence_Inputs
      path: /Absence_Management/Get_Absence_Inputs
      operations:
      - name: getabsenceinputs
        method: POST
        description: Workday Studio Retrieve Absence Inputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WORKDAY_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: web-services-absence-management-rest
    port: 8080
    description: REST adapter for Workday Studio Workday Web Services API — Absence Management. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/absence-management/get-absence-inputs
      name: absence-management-get-absence-inputs
      description: REST surface for Absence_Management-Get_Absence_Inputs.
      operations:
      - method: POST
        name: getabsenceinputs
        description: Workday Studio Retrieve Absence Inputs
        call: web-services-absence-management.getabsenceinputs
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-services-absence-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Studio Workday Web Services API — Absence Management. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-studio-retrieve-absence-inputs
      description: Workday Studio Retrieve Absence Inputs
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: web-services-absence-management.getabsenceinputs
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
