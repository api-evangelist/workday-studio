naftiko: 1.0.0-alpha2
info:
  label: Workday Studio Workday Web Services API — Recruiting
  description: 'Workday Studio Workday Web Services API — Recruiting. 1 operations. Lead operation: Workday Studio Retrieve
    Candidates. Self-contained Naftiko capability covering one Workday Studio business surface.'
  tags:
  - Workday Studio
  - Recruiting
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_STUDIO_API_KEY: WORKDAY_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-services-recruiting
    baseUri: https://{baseUrl}/ccx/service/{tenant}
    description: Workday Studio Workday Web Services API — Recruiting business capability. Self-contained, no shared references.
    resources:
    - name: Recruiting-Get_Candidates
      path: /Recruiting/Get_Candidates
      operations:
      - name: getcandidates
        method: POST
        description: Workday Studio Retrieve Candidates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WORKDAY_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: web-services-recruiting-rest
    port: 8080
    description: REST adapter for Workday Studio Workday Web Services API — Recruiting. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/recruiting/get-candidates
      name: recruiting-get-candidates
      description: REST surface for Recruiting-Get_Candidates.
      operations:
      - method: POST
        name: getcandidates
        description: Workday Studio Retrieve Candidates
        call: web-services-recruiting.getcandidates
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-services-recruiting-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Studio Workday Web Services API — Recruiting. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-studio-retrieve-candidates
      description: Workday Studio Retrieve Candidates
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: web-services-recruiting.getcandidates
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
