naftiko: 1.0.0-alpha2
info:
  label: Workday Studio Integration API — Integration Systems
  description: 'Workday Studio Integration API — Integration Systems. 3 operations. Lead operation: Workday Studio List Integration
    Systems. Self-contained Naftiko capability covering one Workday Studio business surface.'
  tags:
  - Workday Studio
  - Integration Systems
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_STUDIO_API_KEY: WORKDAY_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: integration-integration-systems
    baseUri: https://{baseUrl}/ccx/service/{tenant}
    description: Workday Studio Integration API — Integration Systems business capability. Self-contained, no shared references.
    resources:
    - name: integrationSystems
      path: /integrationSystems
      operations:
      - name: listintegrationsystems
        method: GET
        description: Workday Studio List Integration Systems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: integrationSystems-ID
      path: /integrationSystems/{ID}
      operations:
      - name: getintegrationsystem
        method: GET
        description: Workday Studio Retrieve a Specific Integration System
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: integrationSystems-ID-launch
      path: /integrationSystems/{ID}/launch
      operations:
      - name: launchintegration
        method: POST
        description: Workday Studio Launch an Integration System
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WORKDAY_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: integration-integration-systems-rest
    port: 8080
    description: REST adapter for Workday Studio Integration API — Integration Systems. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/integrationsystems
      name: integrationsystems
      description: REST surface for integrationSystems.
      operations:
      - method: GET
        name: listintegrationsystems
        description: Workday Studio List Integration Systems
        call: integration-integration-systems.listintegrationsystems
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/integrationsystems/{id}
      name: integrationsystems-id
      description: REST surface for integrationSystems-ID.
      operations:
      - method: GET
        name: getintegrationsystem
        description: Workday Studio Retrieve a Specific Integration System
        call: integration-integration-systems.getintegrationsystem
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/integrationsystems/{id}/launch
      name: integrationsystems-id-launch
      description: REST surface for integrationSystems-ID-launch.
      operations:
      - method: POST
        name: launchintegration
        description: Workday Studio Launch an Integration System
        call: integration-integration-systems.launchintegration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: integration-integration-systems-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Studio Integration API — Integration Systems. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-studio-list-integration-systems
      description: Workday Studio List Integration Systems
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: integration-integration-systems.listintegrationsystems
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-studio-retrieve-specific-integration
      description: Workday Studio Retrieve a Specific Integration System
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: integration-integration-systems.getintegrationsystem
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-studio-launch-integration-system
      description: Workday Studio Launch an Integration System
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: integration-integration-systems.launchintegration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
