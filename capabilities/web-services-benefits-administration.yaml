naftiko: 1.0.0-alpha2
info:
  label: Workday Studio Workday Web Services API — Benefits Administration
  description: 'Workday Studio Workday Web Services API — Benefits Administration. 1 operations. Lead operation: Workday Studio
    Retrieve Benefit Plans. Self-contained Naftiko capability covering one Workday Studio business surface.'
  tags:
  - Workday Studio
  - Benefits Administration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_STUDIO_API_KEY: WORKDAY_STUDIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-services-benefits-administration
    baseUri: https://{baseUrl}/ccx/service/{tenant}
    description: Workday Studio Workday Web Services API — Benefits Administration business capability. Self-contained, no
      shared references.
    resources:
    - name: Benefits_Administration-Get_Benefit_Plans
      path: /Benefits_Administration/Get_Benefit_Plans
      operations:
      - name: getbenefitplans
        method: POST
        description: Workday Studio Retrieve Benefit Plans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WORKDAY_STUDIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: web-services-benefits-administration-rest
    port: 8080
    description: REST adapter for Workday Studio Workday Web Services API — Benefits Administration. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/benefits-administration/get-benefit-plans
      name: benefits-administration-get-benefit-plans
      description: REST surface for Benefits_Administration-Get_Benefit_Plans.
      operations:
      - method: POST
        name: getbenefitplans
        description: Workday Studio Retrieve Benefit Plans
        call: web-services-benefits-administration.getbenefitplans
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-services-benefits-administration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Studio Workday Web Services API — Benefits Administration. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-studio-retrieve-benefit-plans
      description: Workday Studio Retrieve Benefit Plans
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: web-services-benefits-administration.getbenefitplans
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
