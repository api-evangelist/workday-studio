description: Workday Studio is an Eclipse-based integration IDE included with a Workday tenant
  subscription. Workday does not publish list pricing or self-serve plans for Studio; access is
  provisioned via direct enterprise sales with the underlying HCM/Financials subscription.
sources:
  - https://www.workday.com/en-us/why-workday/about-us/contact-us.html
  - https://doc.workday.com/
notes: Workday public pricing pages return 404 and Studio reference docs at doc.workday.com /
  community.workday.com require authenticated customer access. No standalone Studio license
  pricing is publicly disclosed.
plans:
  - id: workday-studio-contact-sales
    name: Contact Sales
    type: enterprise
    description: Enterprise-only commercial terms. Workday Studio is bundled with a Workday tenant
      and integration entitlements; no standalone Studio price list is published.
    entries:
