        name: tenant_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Workday Studio Integration API
      - name: Eclipse-based integration IDE
      - name: Custom integration deployment
