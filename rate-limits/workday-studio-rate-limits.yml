specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Workday Studio
providerId: workday-studio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Integration
  - Workday
description: Workday Studio integrations call the same gated Workday Web Services and Integration
  endpoints as other Workday APIs; rate limits are tenant-scoped and documented only inside the
  authenticated Workday Community reference. Studio integrations are typically scheduled or
  long-running rather than per-second request workloads.
sources:
  - https://community.workday.com/api
  - https://community.workday.com/sites/default/files/file-hosting/productionapi/Integrations/v17/Integrations.html
responseCodes:
  serviceUnavailable: 503
limits:
  - name: Tenant-scoped throttling for Studio-deployed integrations
    scope: tenant
    metric: varies
    limit: see https://community.workday.com/api
    notes: Studio integrations consume the same Workday Web Services throttle pool as any other
      tenant integration; specific concurrency and SOAP-fault thresholds are gated.
policies:
  - name: Documentation gating
    description: Workday rate-limit policy is published only on community.workday.com, which
      requires a customer login. No public per-second or per-minute numbers are available.
  - name: Long-running orchestration
    description: Studio integrations are typically launched on a schedule; concurrency is governed
      by the tenant's Integration System User capacity and the Workday Integration Cloud queue.
  - name: Backoff
    description: Studio steps should implement Workday's retry-on-503 and exponential-backoff
      pattern documented in the gated Studio reference.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
