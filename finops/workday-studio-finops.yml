specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Workday Studio
providerId: workday-studio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Integration
  - Workday
description: FinOps shape for Workday Studio is opaque. Studio is an IDE bundled with a Workday
  tenant subscription; runtime API consumption is part of the same tenant contract with no
  per-integration meter, FOCUS export, or public usage-billing API.
sources:
  - https://www.workday.com/en-us/why-workday/about-us/contact-us.html
  - https://doc.workday.com/
notes: Workday does not expose a FOCUS-aligned cost export for Studio integrations. Meters and
  charge categories cannot be reconciled without authenticated access to the customer's Workday
  Community documentation and contract.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Workday, Inc.
serviceCategory: HR / Finance SaaS
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Workday Studio
  ServiceCategory: HR / Finance SaaS
  ProviderName: Workday
  PublisherName: Workday, Inc.
  InvoiceIssuerName: Workday, Inc.
  BillingCurrency: USD
meters:
  - name: tenant_subscription
    unit: month
    aggregation: sum
    dimensions:
      - tenant
principles:
  - name: Visibility
    description: No public usage API; customers track Studio integration runs through the Workday
      Integration Cloud monitor inside the tenant.
  - name: Allocation
    description: Costs allocate by Workday tenant and integration entitlement; per-integration
      attribution depends on Studio's internal run history rather than a billing export.
  - name: Optimization
    description: Levers are integration-design choices (batch sizing, schedule frequency, EIB use
      where appropriate) rather than rate or commitment discounts.
  - name: Accountability
    description: Studio license is owned by Workday procurement; Studio integration design and
      operation are owned by the integration engineering team.
