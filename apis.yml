        url: https://doc.workday.com/reader/wsiU0cnNjCc_k7shLNxLEA/kPBEj3_Lz04YDSUvAEKl4w
  - name: Workday Orchestrate API
    description: >-
      Low-code integration and automation platform for building event-driven and batch integrations using a visual
      drag-and-drop builder. Enables developers to create workflows that connect Workday with external systems, automate
      business processes, and handle real-time data synchronization.
    image: https://www.workday.com/content/dam/web/en-us/images/logos/workday-logo.svg
