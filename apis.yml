  - name: Workday Custom Reports API
    description: >-
      API for creating and executing custom reports built in Workday Studio. Exposes custom reports as RESTful web
      services through Report-as-a-Service (RaaS), enabling programmatic access to report data with support for query
      parameters and multiple output formats.
    image: https://www.workday.com/content/dam/web/en-us/images/logos/workday-logo.svg
    humanUrl: https://doc.workday.com/
    baseUrl: https://{tenant}.workday.com/ccx/service/customreport2/{tenant}
