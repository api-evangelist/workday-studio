    description: >-
      RESTful API providing modern JSON-based access to Workday data and services. Uses OAuth 2.0 authentication and
      standard HTTP methods for operations across HCM, financial management, recruiting, payroll, and other Workday
      domains.
    image: https://www.workday.com/content/dam/web/en-us/images/logos/workday-logo.svg
